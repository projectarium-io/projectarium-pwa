name: 🚀 Deploy to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO:   083365649555.dkr.ecr.us-east-1.amazonaws.com/projectarium/pwa
  EC2_HOST:   ec2-18-210-101-173.compute-1.amazonaws.com
  EC2_USER:   projectarium

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://18.210.101.173:8888/api

      - name: 🏗️ Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/projectarium/pwa"

      - name: 🚀 Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     ECR_REPO,AWS_REGION
          script: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO
            docker pull $ECR_REPO:latest
            cd /home/projectarium/pwa
            ECR_REPO=$ECR_REPO docker compose up -d --force-recreate
            docker image prune -af